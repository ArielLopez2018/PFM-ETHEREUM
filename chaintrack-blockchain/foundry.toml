[profile.default]
src         = "src"
out         = "out"
libs        = ["lib"]
script      = "script"
test        = "test"
solc        = "0.8.19"
optimizer   = true
optimizer_runs = 200
via_ir      = true

# Mostrar logs de console.log en tests
verbosity = 2

[rpc_endpoints]
# Carga las URLs desde .env
sepolia  = "${RPC_URL_SEPOLIA}"
mainnet  = "${RPC_URL_MAINNET}"
anvil    = "http://127.0.0.1:8545"
mumbai   = "${RPC_URL_MUMBAI}"

[etherscan]
# Para --verify en el deploy
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
mainnet = { key = "${ETHERSCAN_API_KEY}" }